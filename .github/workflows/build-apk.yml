name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'mobile-web/**'
      - 'capacitor.config.ts'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android
        run: node_modules/.bin/cap sync android 2>&1 | tee cap-sync.log

      - name: Upload sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cap-sync-log
          path: cap-sync.log

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee gradle-build.log

      - name: List APK outputs
        if: always()
        run: find android/app/build/outputs -type f | tee apk-find.log || true

      - name: Upload outputs listing
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-find-log
          path: apk-find.log
          if-no-files-found: ignore

      - name: Upload gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: android/gradle-build.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
