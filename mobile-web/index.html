<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sloka Sabha</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #fff8ed;
        color: #261f1a;
      }
      .wrap {
        max-width: 560px;
        margin: 48px auto;
        padding: 0 16px;
      }
      .card {
        border: 1px solid #eadfce;
        border-radius: 8px;
        padding: 20px;
        background: #fff;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 8px 0;
        line-height: 1.5;
      }
      code {
        background: #f7efe2;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Sloka Sabha Android Shell</h1>
        <p>This Android build is ready, but no remote app URL is configured yet.</p>
        <p>Set <code>CAPACITOR_APP_URL</code> to your deployed web app URL, then run <code>npm run android:sync</code>.</p>
      </section>
    </main>
  </body>
</html>
